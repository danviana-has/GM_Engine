<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Play - Explore GM Engine Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #08090c;
            --bg-card: rgba(18, 20, 27, 0.7);
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.4);
            --secondary: #9d00ff;
            --secondary-glow: rgba(157, 0, 255, 0.4);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(0, 240, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(157, 0, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
        }

        header {
            padding: 2.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8, 9, 12, 0.8);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            border-radius: 3px;
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        main {
            max-width: 1300px;
            margin: 0 auto;
            padding: 3rem 5%;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeIn 1s ease;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        .hero h1 span {
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: var(--border);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 2rem;
        }

        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(8px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--border-hover);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(0, 240, 255, 0.05);
        }

        .game-card:hover::before {
            opacity: 1;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.25rem;
        }

        .game-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .game-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .game-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            flex-grow: 1;
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 1.25rem;
        }

        .game-size {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
        }

        .play-btn {
            background: linear-gradient(135deg, var(--primary), #00b8ff);
            color: #000;
            font-weight: 600;
            padding: 0.65rem 1.5rem;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 240, 255, 0.6);
        }

        .no-games {
            text-align: center;
            grid-column: 1 / -1;
            padding: 4rem 2rem;
            background: var(--bg-card);
            border: 1px dashed var(--border);
            border-radius: 16px;
            color: var(--text-muted);
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            margin-top: 5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">GM Play</div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Search games...">
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Welcome to <span>GM Play</span></h1>
            <p>Explore, download, and play standalone 3D games published directly from the GM Engine creator studio.</p>
        </section>

        <h2 class="section-title">Available Creations</h2>

        <div class="games-grid" id="games-container">
            <!-- Games will be loaded here dynamically -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 GM Play. Created with GM Engine.</p>
    </footer>

    <!-- games.js is generated by GM Engine when you publish a game. It sets window.gmPlayGames. -->
    <script src="games.js"></script>
    <script>
        const container = document.getElementById('games-container');
        const searchInput = document.getElementById('search');
        let allGames = [];

        function loadGames() {
            // Use the global variable injected by games.js (avoids CORS on file:// protocol)
            if (typeof gmPlayGames !== 'undefined' && Array.isArray(gmPlayGames)) {
                allGames = gmPlayGames;
            } else {
                allGames = [];
            }
            renderGames(allGames);
        }

        function renderGames(games) {
            container.innerHTML = '';
            if (games.length === 0) {
                container.innerHTML = `
                    <div class="no-games">
                        <h3>No games found</h3>
                        <p>Publish your first game from GM Engine to see it here!</p>
                    </div>
                `;
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div>
                        <div class="game-header">
                            <h3 class="game-title">${escapeHtml(game.title)}</h3>
                            <span class="game-date">${escapeHtml(game.date)}</span>
                        </div>
                        <p class="game-desc">${escapeHtml(game.description)}</p>
                    </div>
                    <div class="game-footer">
                        <span class="game-size">${escapeHtml(game.fileSize)}</span>
                        <a href="${game.binary}" class="play-btn" download>
                            Download Game
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allGames.filter(game => 
                game.title.toLowerCase().includes(query) || 
                game.description.toLowerCase().includes(query)
            );
            renderGames(filtered);
        });

        // Initialize – no async needed since games.js is already parsed by the browser
        loadGames();
    </script>
</body>
</html>
